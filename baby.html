<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Para mi Baby 🌸</title>

<style>
:root {
  --radius: 40px;
  --text-sm: clamp(12px, 2.5vw, 14px);
  --text-md: clamp(14px, 3vw, 16px);
  --text-lg: clamp(18px, 5vw, 22px);
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100dvh; /* mejor que vh en móviles */
  background: linear-gradient(145deg, #ffb347, #ff7e5e, #6b2e6e, #0a0f2a);
  font-family: system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: clamp(10px, 3vw, 20px);
  overflow-x: hidden;
}

/* CONTENEDOR */
.regalo {
  width: 100%;
  max-width: 480px;
  background: rgba(20,12,28,0.6);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  /* fallback para Safari */
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* CIELO */
.cielo {
  height: clamp(180px, 40vh, 280px);
  position: relative;
  background: radial-gradient(circle at 30% 70%, #ffb56b, #d45c4c, #562c5e);
}

/* SOL / LUNA */
.sol, .luna {
  position: absolute;
  border-radius: 50%;
}

.sol {
  width: clamp(50px, 15vw, 70px);
  height: clamp(50px, 15vw, 70px);
  bottom: 20px;
  right: 20px;
  background: #ffe29a;
}

.luna {
  width: clamp(40px, 12vw, 52px);
  height: clamp(40px, 12vw, 52px);
  top: 20px;
  left: 20px;
  background: #fff5dd;
  opacity: 0;
}

/* JARDÍN */
.jardin {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: clamp(10px, 3vw, 20px);
  padding: 16px;
}

.flor-emoji {
  font-size: clamp(32px, 8vw, 48px);
}

/* CHAT */
.conversacion {
  margin: 10px;
  padding: 10px;
  max-height: 35vh;
  overflow-y: auto;

  /* scroll suave en iOS */
  -webkit-overflow-scrolling: touch;
}

.msg {
  font-size: var(--text-sm);
  padding: 10px;
  border-radius: 20px;
  max-width: 85%;
}

/* FECHAS */
.fecha-corazon {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.fecha {
  font-size: var(--text-sm);
  padding: 6px 10px;
}

/* CARTA */
.carta {
  margin: 10px;
  padding: 14px;
  font-size: var(--text-md);
}

.letra {
  font-size: var(--text-sm);
}

/* FIRMA */
.firma {
  font-size: var(--text-sm);
  padding-bottom: 20px;
}

/* RESPONSIVE EXTRA */
@media (max-width: 360px) {
  .msg {
    font-size: 12px;
  }
}
</style>
</head>

<body>
<div class="regalo">
  <div class="cielo">
    <div class="sol"></div>
    <div class="luna"></div>
  </div>

  <div class="jardin">
    <div class="flor"><div class="flor-emoji">🌻</div></div>
    <div class="flor"><div class="flor-emoji">🌸</div></div>
    <div class="flor"><div class="flor-emoji">🌙</div></div>
    <div class="flor"><div class="flor-emoji">🌹</div></div>
  </div>

  <div class="conversacion">
    <div class="msg">Nos vemos baby 🥰</div>
    <div class="msg">Ya llegué!! 🤭</div>
  </div>

  <div class="fecha-corazon">
    <div class="fecha">✨ 1998</div>
    <div class="fecha">🌙 2022</div>
    <div class="fecha">🌸 2002</div>
  </div>

  <div class="carta">
    💌 Toca para leer
    <div class="letra">
      Y aunque las nubes quieran tapar la luna...
    </div>
  </div>

  <div class="firma">
    hecho con 💻❤️
  </div>
</div>
</body>
</html>
